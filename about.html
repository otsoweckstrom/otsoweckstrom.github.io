      <div id="puppy" onclick="movePuppy()">
        <script>
          var move = 20;
          var movingPuppy = document.getElementById("puppy");
          var direction = true;
          function movePuppy()
          {
            if(movingPuppy.style.left == "1500px"){
              direction = false;
              movingPuppy.style.transform  = "scaleX(-1)";
              movingPuppy.style.left = "1480px";
            }
            else if(movingPuppy.style.left == "0px"){
              direction = true;
              movingPuppy.style.transform  = "scaleX(1)";
              movingPuppy.style.left = "20px";
              
            }
            else if(!direction){
              movingPuppy.style.left = move + "px";
              move -= 20;
            }
            else if(direction){
              movingPuppy.style.left = move + "px";
              move += 20;
            }

          }
          
        </script>
      </div>
